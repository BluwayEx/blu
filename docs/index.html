    /* ===========================
   MODAL DE COMPRA - NUEVO ESTILO
=========================== */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:.35s;
background:rgba(0,0,0,.75);
backdrop-filter:blur(8px);
z-index:9999;
}

.modal.active{
visibility:visible;
opacity:1;
}

.modal-content{

position:relative;

width:90%;
max-width:400px;

padding:30px;

border-radius:28px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.10);

box-shadow:
0 25px 60px rgba(0,0,0,.45),
0 0 35px rgba(0,229,255,.18);

animation:modalShow .45s ease;

overflow:hidden;

}

.modal-content::before{

content:"";

position:absolute;

width:260px;
height:260px;

border-radius:50%;

background:#00e5ff;

filter:blur(120px);

opacity:.12;

top:-120px;
left:-100px;

pointer-events:none;

}

.modal-content::after{

content:"";

position:absolute;

width:220px;
height:220px;

border-radius:50%;

background:#5b3cff;

filter:blur(120px);

opacity:.12;

bottom:-120px;
right:-80px;

pointer-events:none;

}

@keyframes modalShow{

from{

opacity:0;

transform:translateY(40px) scale(.95);

}

to{

opacity:1;

transform:translateY(0) scale(1);

}

}

.modal-content>*{

position:relative;

z-index:2;

}

.modal-content h3{

color:#fff;

font-size:28px;

font-weight:600;

margin-bottom:25px;

text-align:center;

}

.modal-content input,
.modal-content select{

width:100%;

padding:15px 18px;

margin:10px 0;

border-radius:14px;

border:1px solid rgba(255,255,255,.15);

background:rgba(255,255,255,.08);

color:#fff;

outline:none;

transition:.35s;

font-size:15px;

}

.modal-content input::placeholder{

color:#d7d7d7;

}

.modal-content input:focus,
.modal-content select:focus{

border-color:#00e5ff;

box-shadow:0 0 20px rgba(0,229,255,.35);

}

.modal-content select{

appearance:none;

}

.search-container {

.search-container.flotante{

/* Animación entrada */

@keyframes buscadorFlota{

  from{

    opacity:0;

    transform:
    translateX(-50%)
    translateY(-30px);

  }

  to{

    opacity:1;

    transform:
    translateX(-50%)
    translateY(0);

  }

}
.search-box {
  position: relative;
  display: flex;

  background: rgba(68, 68, 68, 0.137);

                    $${Number(producto.precio).toFixed(2)}
                </div>

            </div>

        </div>

        `;

    });

    listaSugerencias.style.display = "block";

}
