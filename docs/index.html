<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluWay | Sin Límites</title>
<link rel="icon" type="image/jpeg" href="imagenes/icono.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ==========================================================
   BLUWAY — DESIGN SYSTEM
   Navy / Cyan / Violet — ocean-tech identity
========================================================== */
:root{
  --navy-950:#04070f;
  --navy-900:#080d24;
  --navy-800:#0A0F2C;
  --navy-700:#141b3f;
  --cyan:#00E5FF;
  --cyan-dim:#00b8cc;
  --violet:#5B3CFF;
  --ivory:#F6F7FB;
  --white:#FFFFFF;
  --ink:#12162B;
  --ink-soft:#6B7280;
  --red:#E11D2E;
  --line:#E7E9F2;
  --radius-lg:22px;
  --radius-md:16px;
  --shadow-lg:0 25px 60px -20px rgba(10,15,44,.35);
  --shadow-glow:0 0 25px rgba(0,229,255,.35);
}

*{margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
html{scroll-behavior:smooth;}
body{
  background: var(--ivory);
  color: var(--ink);
  overflow-x:hidden;
  user-select:none;
  -webkit-user-select:none;
}
img{pointer-events:none;}
a{text-decoration:none;}
:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

/* ===================== HEADER ===================== */
header{
  background: var(--navy-800);
  padding:16px 24px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid rgba(0,240,255,.18);
  box-shadow:0 4px 24px rgba(0,0,0,.35);
  position:sticky; top:0; z-index:500;
}
header h1{
  font-size:1.7em; font-weight:800; letter-spacing:1px;
  background:linear-gradient(90deg,#00BFFF,#00F0FF);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  text-shadow:0 0 18px rgba(0,240,255,.35);
}
.menu-btn{font-size:26px; color:#fff; cursor:pointer; transition:.25s;}
.menu-btn:hover{color:var(--cyan); text-shadow:0 0 10px var(--cyan);}
nav a{color:#d6d9e6; font-weight:500; transition:.25s; padding:8px 4px;}
nav a:hover{color:var(--cyan); text-shadow:0 0 10px var(--cyan);}

/* ===================== CATALOGO DROPDOWN ===================== */
#menuCatalogo{
  background: rgba(10,15,44,.92);
  backdrop-filter: blur(14px);
  border:1px solid rgba(0,240,255,.25);
  border-radius:14px;
  box-shadow:0 15px 40px rgba(0,0,0,.5), 0 0 25px rgba(0,229,255,.2);
  padding:8px 0;
  min-width:220px;
}
.categoria-item{
  color:#e7e9f2; font-size:.92em; transition:.2s;
}
.categoria-item:hover{ background:rgba(0,229,255,.1); color:var(--cyan); padding-left:26px !important; }

/* ===================== MENU LATERAL ===================== */
.menu-fondo{
  position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; z-index:998;
}
.menu-fondo.abierto{display:block;}
.menu-lateral{
  position:fixed; top:0; left:-280px; width:270px; height:100%;
  background:var(--white); transition:.35s cubic-bezier(.4,0,.2,1); z-index:999;
  overflow-y:auto; box-shadow:8px 0 30px rgba(0,0,0,.25);
}
.menu-lateral.abierto{left:0;}
.perfil{ background:var(--navy-800); color:#fff; text-align:center; padding:30px 20px; }
#fotoPerfil{
  width:80px; height:80px; border-radius:50%; object-fit:cover;
  border:2px solid var(--cyan); box-shadow:0 0 15px rgba(0,240,255,.4); transition:.3s;
}
#fotoPerfil:hover{ transform:scale(1.06); box-shadow:0 0 25px rgba(0,240,255,.7); }
.perfil h3{ margin-top:12px; font-size:16px; font-weight:700; }
.perfil p{ font-size:12px; color:#aab; margin-top:2px; }
.menu-lateral a{
  display:flex; align-items:center; gap:10px;
  padding:16px 22px; color:var(--ink); border-bottom:1px solid var(--line); transition:.2s; font-weight:500;
}
.menu-lateral a:hover{ background:var(--ivory); padding-left:30px; color:var(--cyan-dim); }

/* ===================== HERO ===================== */
.hero{
  position:relative;
  padding:64px 20px 90px;
  text-align:center;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(0,229,255,.25), transparent 60%),
    radial-gradient(ellipse 70% 50% at 100% 10%, rgba(91,60,255,.30), transparent 60%),
    linear-gradient(160deg, var(--navy-950), var(--navy-800) 65%, var(--navy-700));
  background-size: cover;
  background-position: center;
  transition: background-image 0.6s ease;
  overflow:hidden;
}
.hero::after{
  content:""; position:absolute; left:0; right:0; bottom:-1px; height:70px;
  background: var(--ivory);
  clip-path: polygon(0 60%, 8% 45%, 18% 60%, 30% 40%, 42% 62%, 55% 38%, 68% 60%, 80% 42%, 92% 58%, 100% 45%, 100% 100%, 0 100%);
}
.hero-content{ position:relative; z-index:2; max-width:720px; margin:0 auto; }
.hero h2.frase{
  font-family:'Playfair Display', serif; font-style:italic; font-weight:400;
  font-size:clamp(1.1rem, 2.4vw, 1.5rem); color:#c8cde0; min-height:1.4em; margin-bottom:22px;
}
.hero h2.tagline{
  font-family:'Playfair Display', serif; font-style:italic; font-weight:400;
  font-size:clamp(1.6rem, 3.4vw, 2.3rem); color:#f1f2f8; margin-top:28px;
  text-shadow:0 0 24px rgba(0,229,255,.25);
}

/* ===================== SEARCH ===================== */
.search-container{
  position:relative; z-index:5; margin:10px auto 0; width:100%; max-width:520px;
}
.search-container.flotante{
  position:fixed; top:88px; left:50%; transform:translateX(-50%);
  width:90%; max-width:520px; z-index:2000; animation:buscadorFlota .35s ease;
}
@keyframes buscadorFlota{ from{opacity:0; transform:translateX(-50%) translateY(-24px);} to{opacity:1; transform:translateX(-50%) translateY(0);} }

.search-box{
  position:relative; display:flex; align-items:center;
  background:rgba(255,255,255,.08); backdrop-filter:blur(14px);
  border:1px solid rgba(0,240,255,.3);
  border-radius:50px; padding:5px 8px 5px 22px;
  box-shadow:0 10px 35px rgba(0,0,0,.35), 0 0 20px rgba(0,229,255,.12);
  transition:.3s;
}
.search-box:focus-within{ border-color:var(--cyan); box-shadow:0 0 30px rgba(0,229,255,.4); background:rgba(4,7,15,.85); }
.search-icon{ color:var(--cyan); font-size:1.05em; margin-right:8px; }
.search-box input{
  width:100%; background:transparent; border:none; outline:none; color:#fff;
  font-size:1em; padding:13px 8px;
}
.search-box input::placeholder{ color:#a9adc4; }
.search-btn{
  border:none; background:linear-gradient(135deg, var(--cyan), var(--cyan-dim));
  color:var(--navy-900); width:42px; height:42px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:.25s; flex-shrink:0;
}
.search-btn:hover{ transform:scale(1.08); box-shadow:0 0 18px rgba(0,229,255,.5); }

.lista-sugerencias{
  position:absolute; top:calc(100% + 8px); left:0; width:100%;
  background:var(--navy-900); border:1px solid rgba(0,240,255,.2);
  border-radius:14px; overflow:hidden; display:none; z-index:99999;
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}
.sugerencia{ display:flex; align-items:center; gap:12px; padding:12px 14px; cursor:pointer; transition:.2s; }
.sugerencia:hover{ background:rgba(0,229,255,.08); }
.sugerencia img{ width:44px; height:44px; object-fit:cover; border-radius:8px; background:#fff; }
.sugerencia .nombre{ color:#fff; font-size:14px; font-weight:500; }
.sugerencia .precio{ color:var(--cyan); font-size:12.5px; margin-top:2px; }

/* ===================== PRODUCT SECTION ===================== */
.product-section{ padding:10px 4% 60px; }
.section-title{
  text-align:center; color:var(--ink); font-size:1.9em; font-weight:800;
  margin: 6px 0 34px; letter-spacing:.3px;
}
.section-title::after{
  content:""; display:block; width:56px; height:4px; margin:12px auto 0;
  background:linear-gradient(90deg, var(--cyan), var(--violet)); border-radius:4px;
}

.slider-container{ position:relative; width:100%; }
.product-slider{
  display:flex; overflow-x:auto; scroll-behavior:smooth; gap:22px; padding:14px 6px 22px;
}
.product-slider::-webkit-scrollbar{ height:7px; }
.product-slider::-webkit-scrollbar-thumb{ background:rgba(0,229,255,.5); border-radius:10px; }
.product-slider::-webkit-scrollbar-track{ background:var(--line); border-radius:10px; }

.slider-btn{
  position:absolute; top:50%; transform:translateY(-50%);
  width:44px; height:72px; border:none;
  background:rgba(10,15,44,.75); color:#fff; font-size:22px; cursor:pointer;
  z-index:20; opacity:0; transition:.25s; display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); box-shadow:0 0 15px rgba(0,240,255,.25);
  border-radius:10px;
}
.slider-btn.left{ left:-4px; }
.slider-btn.right{ right:-4px; }
.slider-container:hover .slider-btn{ opacity:1; }
@media(max-width:768px){ .slider-btn{ display:none; } }

.product-card{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius-lg);
  overflow:hidden; transition:.3s; box-shadow:0 6px 20px rgba(10,15,44,.06);
  flex:0 0 270px; display:flex; flex-direction:column;
}
.product-card:hover{ transform:translateY(-8px); box-shadow:0 20px 40px rgba(10,15,44,.16); border-color:rgba(0,229,255,.4); }
.product-card img{
  width:100%; height:230px; object-fit:contain; background:var(--ivory);
  border-bottom:1px solid var(--line); padding:14px;
}
.product-info{ padding:18px 18px 20px; text-align:center; display:flex; flex-direction:column; gap:6px; flex:1; }
.titulo-producto{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:2px; }
.product-info h3{ color:var(--ink); font-size:1.08em; font-weight:700; }
.product-info p{ color:var(--ink-soft); font-size:.86em; min-height:1.2em; }

.info-btn{
  width:28px; height:28px; display:flex; align-items:center; justify-content:center;
  border:none; border-radius:50%; background:var(--violet); color:#fff; font-size:15px; cursor:pointer;
  transition:.25s; flex-shrink:0;
}
.info-btn:hover{ transform:scale(1.12); background:var(--cyan); color:var(--navy-900); box-shadow:0 0 16px rgba(0,229,255,.6); }

.price{ color:var(--red); display:flex; align-items:baseline; justify-content:center; gap:1px; margin-top:4px; }
.currency{ font-size:22px; margin-top:2px; font-weight:600; }
.entero{ font-size:28px; line-height:1; font-weight:800; }
.decimal{ font-size:18px; margin-top:2px; font-weight:600; }
.precio-anterior{
  color:var(--ink-soft); font-size:15px; text-decoration:line-through; font-weight:500; margin-top:-2px;
}

.btn{
  width:88%; margin:12px auto 4px; height:50px; display:flex; justify-content:center; align-items:center; gap:10px;
  border:none; border-radius:40px; cursor:pointer; font-size:16px; font-weight:700; color:var(--navy-900);
  background:linear-gradient(135deg, var(--cyan), #5be0ff);
  box-shadow:0 10px 22px rgba(0,229,255,.3); transition:.3s; position:relative; overflow:hidden;
}
.btn:hover{ transform:translateY(-2px); box-shadow:0 14px 28px rgba(0,229,255,.45); }
.btn::before{
  content:""; position:absolute; top:0; left:-75%; width:50%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,.6), transparent);
  transform:skewX(-25deg);
}
.btn:hover::before{ animation:shine .75s forwards; }
@keyframes shine{ 100%{ left:125%; } }
.cart-icon{ font-size:18px; transition:.3s; }
.btn:hover .cart-icon{ animation:bounce .6s; }
@keyframes bounce{ 0%,100%{transform:translateY(0);} 30%{transform:translateY(-6px);} 60%{transform:translateY(3px);} }
@media(max-width:768px){ .btn::before, .btn:hover::before{ animation:none; background:none; } }

/* ===================== FOOTER ===================== */
footer{
  text-align:center; padding:26px; background:var(--navy-950); color:var(--cyan);
  border-top:1px solid rgba(0,240,255,.18); font-size:.9em;
}

/* ===================== MODALS ===================== */
.modal{
  position:fixed; inset:0; display:flex; justify-content:center; align-items:center;
  visibility:hidden; opacity:0; transition:.35s; background:rgba(0,0,0,.75); backdrop-filter:blur(8px); z-index:9999;
}
.modal.active{ visibility:visible; opacity:1; }
.modal-content{
  position:relative; width:90%; max-width:400px; padding:32px;
  border-radius:28px; background:rgba(20,27,63,.55); backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 25px 60px rgba(0,0,0,.45), 0 0 35px rgba(0,229,255,.18);
  animation:modalShow .4s ease; overflow:hidden;
}
.modal-content::before{ content:""; position:absolute; width:260px; height:260px; border-radius:50%; background:var(--cyan); filter:blur(120px); opacity:.15; top:-120px; left:-100px; pointer-events:none; }
.modal-content::after{ content:""; position:absolute; width:220px; height:220px; border-radius:50%; background:var(--violet); filter:blur(120px); opacity:.15; bottom:-120px; right:-80px; pointer-events:none; }
@keyframes modalShow{ from{opacity:0; transform:translateY(40px) scale(.95);} to{opacity:1; transform:translateY(0) scale(1);} }
.modal-content>*{ position:relative; z-index:2; }
.modal-content h3{ color:#fff; font-size:26px; font-weight:700; margin-bottom:22px; text-align:center; }
.modal-content input, .modal-content select{
  width:100%; padding:15px 18px; margin:9px 0; border-radius:14px;
  border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.08); color:#fff; outline:none;
  transition:.3s; font-size:15px;
}
.modal-content input::placeholder{ color:#c7cbe0; }
.modal-content input:focus, .modal-content select:focus{ border-color:var(--cyan); box-shadow:0 0 20px rgba(0,229,255,.35); }
.modal-content select{ appearance:none; }
.usuario-box small{ display:block; color:#a9adc9; font-size:12px; margin-bottom:4px; }
#usuarioPedido{ font-size:16px; font-weight:600; }

button.pay-btn{
  width:100%; margin-top:18px; padding:16px; border:none; border-radius:15px;
  background:linear-gradient(135deg, var(--cyan), var(--violet)); color:#fff; font-size:16px; font-weight:700; cursor:pointer; transition:.3s;
}
button.pay-btn:hover{ transform:translateY(-3px); box-shadow:0 0 25px rgba(0,229,255,.45); }
button.close{ margin-top:14px; background:none; border:none; color:#d7dff8; cursor:pointer; font-size:14px; transition:.25s; width:100%; text-align:center; }
button.close:hover{ color:var(--cyan); }

.location{ display:flex; gap:10px; }
.location input{ flex:1; }
.location button{
  padding:0 18px; border:none; border-radius:14px; cursor:pointer;
  background:linear-gradient(135deg, var(--cyan), #4b9fff); color:#fff; font-weight:600; transition:.3s; white-space:nowrap;
}
.location button:hover{ transform:translateY(-2px); box-shadow:0 0 18px rgba(0,229,255,.45); }

/* Info modal */
.info-modal-content{ max-width:880px; background:var(--white); padding:44px; width:95%; }
.info-modal-content::before, .info-modal-content::after{ display:none; }
.info-layout{ display:flex; gap:40px; align-items:flex-start; }
.info-details{ flex:1; min-width:0; text-align:left; }
.info-details h3{ font-size:1.35em; color:var(--ink); }
.info-categoria{
  display:inline-block; background:var(--ivory); color:var(--ink-soft); font-size:12px;
  padding:5px 12px; border-radius:20px; margin:10px 0; font-weight:600;
}
.info-descripcion{ color:#444; font-size:.92em; margin:8px 0 4px; line-height:1.55; }
.info-image{ flex:0 0 340px; }
.info-image img{ width:100%; border-radius:16px; object-fit:contain; aspect-ratio:1/1; background:var(--ivory); border:1px solid var(--line); }
.info-comprar-btn{ width:100%; margin-top:16px; color:var(--navy-900); }
#infoPrecioBox{ display:flex; align-items:baseline; justify-content:flex-start; gap:2px; margin-top:8px; }

@media (max-width:768px){
  .info-modal-content{ padding:20px; }
  .info-layout{ flex-direction:column; gap:16px; }
  .info-image{ flex:0 0 auto; width:100%; }
  .info-details h3{ font-size:1.1em; }
  .info-descripcion{ font-size:.85em; }
}

/* Telefono states */
.telefono-ok{ border-color:#00ff88 !important; box-shadow:0 0 15px #00ff88, 0 0 30px rgba(0,255,140,.4) !important; }
.telefono-error{ border-color:#ff3355 !important; box-shadow:0 0 15px #ff3355, 0 0 30px rgba(255,50,80,.4) !important; }

/* QR */
.qr-box{ position:relative; display:flex; justify-content:center; align-items:center; margin:20px auto; width:250px; height:250px; }
.qrcode img{ width:250px; height:250px; background:#fff; padding:10px; border-radius:15px; }
.qr-logo{
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:40px; font-weight:900; color:var(--cyan); background:rgba(4,7,15,.8);
  border:3px solid var(--cyan); box-shadow:0 0 15px var(--cyan), 0 0 35px rgba(0,229,255,.8);
  animation:pulsoB 2s infinite;
}
@keyframes pulsoB{ 0%,100%{transform:translate(-50%,-50%) scale(1);} 50%{transform:translate(-50%,-50%) scale(1.12);} }

/* ===================== RESPONSIVE ===================== */
@media (max-width:768px){
  header h1{ font-size:1.4em; }
  .hero{ padding:44px 16px 80px; }
  .product-card{ flex:0 0 84%; }
  .section-title{ font-size:1.5em; }
}

@media (prefers-reduced-motion: reduce){
  *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; scroll-behavior:auto !important; }
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:15px;">
    <div class="menu-btn" onclick="abrirMenu()"><i class="fa-solid fa-bars"></i></div>
    <h1>BluWay</h1>
  </div>
  <nav>
    <a href="#" id="btnCatalogo">Catálogo</a>
  </nav>
</header>

<div id="menuCatalogo" style="display:none; position:absolute; top:70px; right:20px; padding:10px 0; min-width:220px; z-index:9999;">
  <div id="listaCategorias"></div>
</div>

<div class="menu-fondo" id="menuFondo" onclick="cerrarMenu()"></div>

<div class="menu-lateral" id="menuLateral">
  <div class="perfil">
    <img id="fotoPerfil" src="imagenes/icono.jpg" alt="Foto de perfil">
    <h3 id="nombrePerfil">BluWay</h3>
    <p id="correoPerfil">Sin Límites</p>
  </div>
  <a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a>
  <a href="bluwaytv.html"><i class="fa-solid fa-tv"></i> TV</a>
  <a href="#" id="perfilUsuario"><i class="fa-solid fa-user"></i> Perfil</a>
  <a href="#" id="cerrarSesion"><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a>
  <a href="#"><i class="fa-solid fa-envelope"></i> Contacto</a>
</div>

<section class="hero">
  <div class="hero-content">
    <h2 id="frase" class="frase"></h2>

    <div class="search-container">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="buscadorProductos" placeholder="Buscar productos..." autocomplete="off">
        <button id="btnBuscar" class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
      </div>
      <div id="listaSugerencias" class="lista-sugerencias"></div>
    </div>

    <h2 class="tagline">De tu elección</h2>
  </div>
</section>

<section class="product-section">
  <h2 class="section-title">Colección</h2>

  <div class="slider-container">
    <button class="slider-btn left" id="btnLeft"><i class="fa-solid fa-chevron-left"></i></button>
    <div class="product-slider" id="productosFirebase"></div>
    <button class="slider-btn right" id="btnRight"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
</section>

<footer>© 2026 BluWay | Sin Límites</footer>

<script src="js/fondos.js"></script>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

window.supabase = createClient(
  "https://nyloxoancdspgmhfaxgu.supabase.co",
  "sb_publishable_L5e4j8t_hWq1Owd2Zi2JOQ_h0PECtSy"
);

const { data } = await window.supabase.auth.getSession();

const fotoPerfil = document.getElementById("fotoPerfil");
const nombrePerfil = document.querySelector(".perfil h3");
const textoPerfil = document.querySelector(".perfil p");

if (data.session) {
  const user = data.session.user;
  nombrePerfil.textContent = user.user_metadata?.full_name || "Usuario";
  textoPerfil.textContent = user.email;
  fotoPerfil.src = user.user_metadata?.avatar_url || "imagenes/icono.jpg";
} else {
  nombrePerfil.textContent = "BluWay";
  textoPerfil.textContent = "Sin Límites";
  fotoPerfil.src = "imagenes/icono.jpg";
  const usuarioPedido = document.getElementById("usuarioPedido");
  if (usuarioPedido) usuarioPedido.value = "No has iniciado sesión";
}

/* =========================
   TELEFONO INTELIGENTE
========================= */
const telefono = document.getElementById("telefono");
telefono.addEventListener("input", () => {
  let numeros = telefono.value.replace(/\D/g, "");
  if (numeros.length > 10) numeros = numeros.substring(0, 10);

  let formato = numeros;
  if (numeros.length > 3) formato = numeros.substring(0,3) + "-" + numeros.substring(3);
  if (numeros.length > 6) formato = numeros.substring(0,3) + "-" + numeros.substring(3,6) + "-" + numeros.substring(6);
  telefono.value = formato;

  if (numeros.length === 0) { telefono.className = ""; return; }

  if (numeros.startsWith("0") && numeros.length <= 10) {
    telefono.classList.add("telefono-ok");
    telefono.classList.remove("telefono-error");
  } else {
    telefono.classList.add("telefono-error");
    telefono.classList.remove("telefono-ok");
  }
});

/* =========================
   OBTENER UBICACION
========================= */
async function obtenerUbicacion() {
  const campoDireccion = document.getElementById("direccion");
  campoDireccion.value = "Solicitando ubicación...";

  if (!navigator.geolocation) { campoDireccion.value = "GPS no disponible"; return; }

  navigator.geolocation.getCurrentPosition(
    async function(posicion) {
      const lat = posicion.coords.latitude;
      const lon = posicion.coords.longitude;
      latitudCliente = lat; longitudCliente = lon;

      try {
        const respuesta = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
        const datos = await respuesta.json();
        campoDireccion.value = datos.display_name || `${lat}, ${lon}`;
      } catch (error) {
        campoDireccion.value = `${lat}, ${lon}`;
      }
    },
    function(error) {
      if (error.code === 1) {
        alert("Por favor activa la ubicación del navegador para completar el pedido.");
        campoDireccion.value = "Permiso de ubicación rechazado";
      } else if (error.code === 2) {
        campoDireccion.value = "Ubicación no disponible";
      } else if (error.code === 3) {
        campoDireccion.value = "Tiempo agotado";
      }
    }
  );
}

/* =========================

document.getElementById("generarPedido").addEventListener("click", function(){
  let direccion = document.getElementById("direccion").value.trim();
  let telefonoVal = document.getElementById("telefono").value.replace(/\s+/g, '');
  let telefonoLimpio = telefonoVal.replace(/\D/g, '');

  if (!/^0\d{9}$/.test(telefonoLimpio)) {
    alert("Ingrese un número válido de 10 dígitos.");
    return;
  }

  if (
    !direccion ||
    direccion.includes("Obteniendo") ||
    direccion.includes("Solicitando") ||
    direccion.includes("Ubicación no permitida") ||
    direccion.includes("GPS no disponible") ||
    !telefonoVal
  ) {
    alert("Espere a que se obtenga la ubicación y complete todos los campos.");
    return;
  }

  document.getElementById("pedidoModal").classList.remove("active");
  document.getElementById("referenciaModal").classList.add("active");
});

/* =========================
   GUARDAR QR
========================= */
async function guardarQR(){
  const imagen = document.getElementById("qrImage");
  if (!imagen) { alert("No existe QR para guardar"); return; }

  try {
    const respuesta = await fetch(imagen.src);
    const blob = await respuesta.blob();
    const url = URL.createObjectURL(blob);
    const enlace = document.createElement("a");
    enlace.href = url;
    enlace.download = "pedido-bluway.png";
    document.body.appendChild(enlace);
    enlace.click();
    document.body.removeChild(enlace);
    URL.revokeObjectURL(url);
  } catch (error) {
    console.log(error);
    alert("No se pudo guardar el QR");
  }
}

/* ==========================
   BUSCADOR DE PRODUCTOS
========================== */
const buscador = document.getElementById("buscadorProductos");
const listaSugerencias = document.getElementById("listaSugerencias");
const contenedorBuscador = document.querySelector(".search-container");

buscador.addEventListener("focus", () => {
  if (window.innerWidth > 768) contenedorBuscador.classList.add("flotante");
});
buscador.addEventListener("blur", () => {
  if (window.innerWidth > 768) contenedorBuscador.classList.remove("flotante");
});
buscador.addEventListener("keydown", (e) => {
  if (window.innerWidth <= 768 && e.key === "Enter") {
    window.hacerScrollBusqueda = true;
    buscarProductos();
    buscador.blur();
  }
});

function ejecutarBusqueda(texto){
  buscador.value = texto;
  window.hacerScrollBusqueda = true;
  buscarProductos();
  listaSugerencias.style.display = "none";
}

function buscarProductos() {
  const texto = buscador.value.toLowerCase();
  const productos = document.querySelectorAll(".product-card");
  let primerProducto = null;

  productos.forEach(producto => {
    const nombre = producto.querySelector("h3").textContent.toLowerCase();
    const description = producto.querySelector("p")?.textContent.toLowerCase() || "";

    if (nombre.includes(texto) || description.includes(texto)) {
      producto.style.display = "";
      if (!primerProducto) primerProducto = producto;
    } else {
      producto.style.display = "none";
    }
  });

  if (
    (window.innerWidth > 768 && primerProducto && texto !== "") ||
    (window.innerWidth <= 768 && window.hacerScrollBusqueda && primerProducto && texto !== "")
  ) {
    setTimeout(() => { primerProducto.scrollIntoView({ behavior: "smooth", block: "center" }); }, 100);
  }
  window.hacerScrollBusqueda = false;
}

function mostrarSugerencias() {
  const texto = buscador.value.toLowerCase().trim();
  listaSugerencias.innerHTML = "";

  if (texto === "") { listaSugerencias.style.display = "none"; return; }

  const encontrados = productosCache.filter(producto => producto.nombre.toLowerCase().includes(texto)).slice(0, 5);
  if (encontrados.length === 0) { listaSugerencias.style.display = "none"; return; }

  encontrados.forEach(producto => {
    listaSugerencias.innerHTML += `
      <div class="sugerencia" data-id="${producto.id}">
        <img src="${producto.imagen}">
        <div>
          <div class="nombre">${producto.nombre}</div>
          <div class="precio">$${Number(producto.precio).toFixed(2)}</div>
        </div>
      </div>`;
  });

  listaSugerencias.style.display = "block";
}

buscador.addEventListener("input", () => {
  window.hacerScrollBusqueda = false;
  buscarProductos();
  mostrarSugerencias();
});

document.getElementById("btnBuscar").addEventListener("click", () => {
  window.hacerScrollBusqueda = true;
  buscarProductos();
  listaSugerencias.style.display = "none";
  buscador.blur();
  if (window.innerWidth > 768) contenedorBuscador.classList.remove("flotante");
});

========================== */

  if (!categoria) return;

  const categoriaSeleccionada = categoria.dataset.categoria;
  menuCatalogo.style.display = "none";

  document.querySelectorAll(".product-card").forEach(producto => {
    if (categoriaSeleccionada === "Todos") { producto.style.display = ""; return; }

    const id = Number(producto.dataset.id);
    const datos = productosCache.find(p => p.id === id);
    if (!datos) return;

    producto.style.display = (datos.categoria === categoriaSeleccionada) ? "" : "none";
  });
});

document.addEventListener("click", (e) => {

   GENERAR PEDIDO FINAL + QR
========================== */
document.getElementById("continuarPedidoFinal").addEventListener("click", function(){

Producto:

Referencias:

Referencia:

  fetch("https://formspree.io/f/mnjkaaqq", {
